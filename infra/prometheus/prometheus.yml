global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'policy_engine'
    static_configs:
      - targets: ['policy_engine:8000']
    metrics_path: '/metrics'

  - job_name: 'audit_logger'
    static_configs:
      - targets: ['audit_logger:8000']
    metrics_path: '/metrics'
