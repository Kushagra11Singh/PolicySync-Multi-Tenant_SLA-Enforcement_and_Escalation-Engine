services:

  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  policy_engine:
    build:
      context: ./services/policy_engine
    env_file: .env
    ports:
      - "${POLICY_ENGINE_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/policy_engine:/app
      - ./shared:/app/shared
    environment:
      PYTHONPATH: /app
      SERVICE_NAME: policy_engine
    command: ./entrypoint.sh

  celery_beat:
    build:
      context: ./services/policy_engine
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/policy_engine:/app
      - ./shared:/app/shared
    environment:
      PYTHONPATH: /app
      SERVICE_NAME: celery_beat
    command: >
      celery -A config beat -l info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler

  escalation_worker:
    build:
      context: ./services/escalation_worker
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/escalation_worker:/app
      - ./shared:/app/shared
    environment:
      PYTHONPATH: /app
      SERVICE_NAME: escalation_worker
    command: celery -A config worker -l info -Q escalation --concurrency=2

  notification_dispatcher:
    build:
      context: ./services/notification_dispatcher
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/notification_dispatcher:/app
      - ./shared:/app/shared
    environment:
      PYTHONPATH: /app
      SERVICE_NAME: notification_dispatcher
    command: celery -A config worker -l info -Q notifications --concurrency=2

  audit_logger:
    build:
      context: ./services/audit_logger
    env_file: .env
    ports:
      - "${AUDIT_LOGGER_PORT:-8002}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/audit_logger:/app
      - ./shared:/app/shared
    environment:
      PYTHONPATH: /app
      SERVICE_NAME: audit_logger
    command: ./entrypoint.sh

  audit_worker:
    build:
      context: ./services/audit_logger
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/audit_logger:/app
      - ./shared:/app/shared
    environment:
      PYTHONPATH: /app
      SERVICE_NAME: audit_worker
    command: celery -A config worker -l info -Q audit --concurrency=2

volumes:
  postgres_data:
