name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: policysync_test
          POSTGRES_USER: ps_user
          POSTGRES_PASSWORD: ps_secret_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.13-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/policy_engine/requirements.txt

      - name: Install dependencies
        run: pip install -r services/policy_engine/requirements.txt

      - name: Lint with flake8
        run: |
          cd services/policy_engine
          flake8 . --config=.flake8

      - name: Run tests
        env:
          DATABASE_URL: postgresql://ps_user:ps_secret_ci@localhost:5432/policysync_test
          CELERY_BROKER_URL: amqp://guest:guest@localhost:5672//
          CELERY_RESULT_BACKEND: rpc://
          SECRET_KEY: ci-test-secret-key-not-real
          DEBUG: "True"
          ALLOWED_HOSTS: localhost,127.0.0.1
          PYTHONPATH: ${{ github.workspace }}/services/policy_engine:${{ github.workspace }}
          SERVICE_NAME: policy_engine
        run: |
          cd services/policy_engine
          pytest tests/ -v --tb=short

      - name: Build Docker images
        run: docker compose build
